# Specify environment variables to set on the remote host and files to copy

# Copy the files and directories needed to setup some common tools
# copy .zshrc .vimrc .vim
# Setup some environment variables
# env SOME_VAR=x
# COPIED_VAR will have the same value on the remote host as it does locally
# env COPIED_VAR=_kitty_copy_env_var_

# Create some per hostname settings
# hostname someserver-*
# copy env-files
# env SOMETHING=else

# hostname someuser@somehost
# copy --dest=foo/bar some-file
# copy --glob some/files.*

hostname atlas cronus hyperion
# Setup zsh and oh-my-zsh
copy --symlink-strategy keep-path .zshrc .zshenv .oh-my.zsh .zsh .p10k.zsh
# Setup neovim
copy --symlink-strategy keep-path --exclude ultisnips .config/nvim
# Setup install dependencies script
copy --symlink-strategy keep-path install-deps

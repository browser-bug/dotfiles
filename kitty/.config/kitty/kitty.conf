# theme
include gruvbox_dark.conf

# fonts
font_family Ubuntu Mono derivative Powerline
font_size 14.0
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

remember_window_size no
copy_on_select yes
map kitty_mod+period launch --type=overlay kitty +runpy "from kitty.config import *; from kitty.utils import *; p = prepare_config_file_for_editing(); import os; os.execvp(get_editor()[0], [get_editor()[0], p])"

# open_url
url_style single
open_url_modifiers ctrl

# carriage-return for zsh-autosuggestion \033 = ^[
map ctrl+enter send_text all \033[[CE

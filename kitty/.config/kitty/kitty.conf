# theme
include gruvbox_dark.conf

# fonts
font_family Ubuntu Mono derivative Powerline
font_size 14.0
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

# general
remember_window_size no
copy_on_select yes
map kitty_mod+period launch --type=overlay kitty +edit-config
enable_audio_bell no
update_check_interval 0

# open_url
url_style single
open_url_modifiers ctrl

# carriage-return for zsh-autosuggestion \033 = ^[
map ctrl+enter send_text all \033[[CE
